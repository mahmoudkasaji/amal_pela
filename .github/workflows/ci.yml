name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# لا يحتاج أي أذونات كتابة — فقط فحص الكود
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install deps (frozen lockfile)
        run: bun install --frozen-lockfile

      - name: TypeScript typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint
        continue-on-error: true  # non-blocking حتى يستقر الـ lint rules

      - name: Build production bundle
        # Supabase env vars ليست مطلوبة لأن supabase.ts يتعامل مع غيابها
        # (Phase 1): الـ build ينتج، والتطبيق يعرض شاشة إعداد في runtime.
        run: bun run build
